name: CI/CD

on:
  push:
    branches:
      - master
      - development
  pull_request:
    branches:
      - master
      - development

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

  build-and-push:
    runs-on: ubuntu-latest
    needs: lint
    if: github.event_name == 'push'
    environment: ${{ github.ref_name == 'master' && 'production' || 'development' }}
    outputs:
      image_name: ${{ steps.meta.outputs.image_name }}
      image_sha_tag: ${{ steps.meta.outputs.image_sha_tag }}
      image_latest_tag: ${{ steps.meta.outputs.image_latest_tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image metadata
        id: meta
        run: |
          IMAGE_NAME="${{ secrets.DOCKERHUB_USERNAME }}/qodari-iam"
          if [ "${{ github.ref_name }}" = "master" ]; then
            CHANNEL="prod"
          else
            CHANNEL="dev"
          fi

          echo "image_name=${IMAGE_NAME}" >> "$GITHUB_OUTPUT"
          echo "image_sha_tag=${IMAGE_NAME}:${CHANNEL}-${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          echo "image_latest_tag=${IMAGE_NAME}:${CHANNEL}-latest" >> "$GITHUB_OUTPUT"

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          target: production
          push: true
          tags: |
            ${{ steps.meta.outputs.image_sha_tag }}
            ${{ steps.meta.outputs.image_latest_tag }}
          build-args: |
            NEXT_PUBLIC_API_URL=${{ vars.NEXT_PUBLIC_API_URL }}
            NEXT_PUBLIC_APP_URL=${{ vars.NEXT_PUBLIC_APP_URL }}
            NEXT_PUBLIC_STORAGE_URL=${{ vars.NEXT_PUBLIC_STORAGE_URL }}

  migrate:
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.event_name == 'push'
    environment: ${{ github.ref_name == 'master' && 'production' || 'development' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run database migrations
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: npm run db:migrate

  deploy:
    runs-on: ubuntu-latest
    needs:
      - build-and-push
      - migrate
    if: github.event_name == 'push'
    environment: ${{ github.ref_name == 'master' && 'production' || 'development' }}

    steps:
      - name: Trigger Dokploy deployment
        env:
          DOKPLOY_DEPLOY_URL: ${{ secrets.DOKPLOY_DEPLOY_URL }}
        run: |
          if [ -z "$DOKPLOY_DEPLOY_URL" ]; then
            echo "Missing DOKPLOY_DEPLOY_URL secret"
            exit 1
          fi

          curl --fail --show-error --silent \
            -X POST \
            "$DOKPLOY_DEPLOY_URL"
